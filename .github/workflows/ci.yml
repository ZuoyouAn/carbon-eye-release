name: Carbon Eye release checks

on:
  push:
    branches: [main, feature/carbon-eye-final-data-upgrade]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-and-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Rebuild release JSON
        run: python scripts/build_carbon_eye_data.py
      - name: Validate release data
        run: python scripts/validate_bundle.py
      - name: Run backend tests
        run: python -m pytest -q
      - name: Audit release contents
        run: python scripts/security_audit.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build Vue application
        run: npm ci && npm run build
