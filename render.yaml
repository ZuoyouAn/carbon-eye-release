services:
  - type: web
    name: personal-website-carbon-eye-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: CARBON_EYE_STANDALONE
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: AQICN_TOKEN
        sync: false
