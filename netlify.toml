[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Public production API endpoint. Local Vite development continues to use its
  # localhost fallback when this Netlify-only configuration is not present.
  VITE_API_BASE = "https://personal-website-carbon-eye-api.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
